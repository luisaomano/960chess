<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajedrez Online Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
/* ======= ESTILOS COMPLETOS ======= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1026, #2a1740);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; align-items: center; }
#s-home, #s-config, #s-lobby, #s-join, #s-join-preview {
  padding: 40px 20px;
  width: 100%;
  max-width: 400px;
}
.screen-title {
  font-size: 28px; font-weight: bold;
  text-align: center; margin-bottom: 8px;
  background: linear-gradient(90deg, #bc9eff, #ffffff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.screen-sub { font-size: 14px; color: #bc9eff; text-align: center; margin-bottom: 30px; }
.opt-group { margin-bottom: 20px; width: 100%; }
.opt-label { font-size: 13px; color: #bc9eff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.opt-row { display: flex; gap: 8px; flex-wrap: wrap; }
.opt-btn {
  padding: 9px 18px; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: #ccc; border-radius: 8px; cursor: pointer;
  font-size: 14px; transition: all 0.15s;
}
.opt-btn.sel { background: #5a2d91; border-color: #9b6de0; color: white; font-weight: bold; }
.btn-primary {
  width: 100%; padding: 13px; border-radius: 8px;
  background: #5a2d91; border: none; color: white;
  font-size: 15px; font-weight: bold; cursor: pointer;
}
.btn-secondary {
  width: 100%; padding: 11px; border-radius: 8px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  color: #ccc; font-size: 14px; cursor: pointer; margin-top: 8px;
}
.id-box {
  width: 100%; background: rgba(255,255,255,0.08);
  border: 1px dashed #9b6de0; border-radius: 10px;
  padding: 16px 20px; margin-bottom: 16px; text-align: center;
}
.id-value { font-family: monospace; font-size: 26px; font-weight: bold; color: #00ffcc; letter-spacing: 4px; }
.info-card { width: 100%; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
.info-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.waiting { color: #bc9eff; font-size: 13px; text-align: center; margin: 10px 0; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
#lobby-publico { width: 100%; margin-top: 15px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; }
.partida-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; cursor: pointer; }
#s-game { padding: 16px; width: 100%; flex-direction: column; align-items: center; }
#status-bar { font-size: 15px; font-weight: bold; color: #bc9eff; text-align: center; margin-bottom: 10px; }
#tablero { display: grid; grid-template-columns: repeat(8, 50px); border: 4px solid #5a2d91; border-radius: 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
@media (min-width: 600px) { #tablero { grid-template-columns: repeat(8, 66px); } .casilla { width: 66px; height: 66px; } }
.casilla { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
.clara { background: #d8c3ff; }
.oscura { background: #6b4ca3; }
.seleccionada { background: #ffd700 !important; }
.destino-posible::after { content: ''; width: 18px; height: 18px; background: rgba(0,0,0,0.2); border-radius: 50%; position: absolute; }
.casilla img { width: 90%; cursor: grab; user-select: none; }
#clocks { display: flex; gap: 12px; margin-bottom: 15px; }
.clock-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 6px 20px; border: 1px solid transparent; font-size: 20px; }
.clock-box.active { border-color: #9b6de0; color: #00ffcc; }
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <p style="font-size:40px;margin:20px 0;text-align:center">♟️</p>
  <h1 class="screen-title">Ajedrez Online</h1>
  <p class="screen-sub">Jugá con un amigo en tiempo real</p>
  <button class="btn-primary" onclick="go('s-config')">Crear partida</button>
  <button class="btn-secondary" onclick="go('s-join'); cargarLobbyPublico();">Unirse a partida</button>
</div>

<div id="s-config" class="screen">
  <h2 class="screen-title">Nueva partida</h2>
  <div class="opt-group">
    <p class="opt-label">⏱ Tiempo</p>
    <div class="opt-row" id="og-time">
      <button class="opt-btn sel" data-val="10+0">10 + 0</button>
      <button class="opt-btn" data-val="5+5">5 + 5</button>
      <button class="opt-btn" data-val="1+1">1 + 1</button>
    </div>
  </div>
  <div class="opt-group">
    <p class="opt-label">🎨 Tu color</p>
    <div class="opt-row" id="og-color">
      <button class="opt-btn sel" data-val="w">Blancas</button>
      <button class="opt-btn" data-val="b">Negras</button>
    </div>
  </div>
  <button class="btn-primary" onclick="crearPartida()">Crear y publicar ID</button>
  <button class="btn-secondary" onclick="go('s-home')">← Volver</button>
</div>

<div id="s-lobby" class="screen">
  <h2 class="screen-title">Partida creada</h2>
  <div class="id-box">
    <p class="id-value" id="lobby-id">---</p>
    <p style="font-size:12px; color:#bc9eff; margin-top:5px;">Tu ID de partida</p>
  </div>
  <p class="waiting">⏳ Esperando al rival...</p>
</div>

<div id="s-join" class="screen">
  <h2 class="screen-title">Unirse</h2>
  <div id="lobby-publico">
    <div id="lista-partidas">Cargando partidas...</div>
  </div>
  <button class="btn-secondary" onclick="go('s-home')">← Volver</button>
</div>

<div id="s-join-preview" class="screen">
  <h2 class="screen-title">Detalles</h2>
  <div class="info-card">
    <div class="info-row"><span>Tiempo:</span><span id="jp-time">—</span></div>
    <div class="info-row"><span>Tu color:</span><span id="jp-color">—</span></div>
  </div>
  <button class="btn-primary" onclick="confirmarUnirse()">Unirse a la partida</button>
</div>

<div id="s-game" class="screen">
  <div id="clocks">
    <div class="clock-box" id="cw">♔ <span id="tw">10:00</span></div>
    <div class="clock-box" id="cb">♚ <span id="tb">10:00</span></div>
  </div>
  <div id="status-bar">Turno de blancas</div>
  <div id="tablero"></div>
  <div style="margin-top:20px; display:flex; gap:10px;">
    <button class="btn-secondary" onclick="girar()">↕️ Girar</button>
    <button class="btn-secondary" onclick="location.reload()">🏠 Salir</button>
  </div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzCRUVxnJPjt5UFB0w0XPFdAn_UmKEnOtdR0vaIslX50jAh6AH8DT1eWlczkKI0U-5D/exec";

let juego = new Chess();
let peer = new Peer();
let conn = null;
let miID = null;
let miColor = 'w';
let orientacion = 'w';
let tiempo = { w: 600, b: 600 };
let reloj = null;
let configLocal = { time: '10+0', color: 'w' };
let configRecibida = null;

const PIEZAS = 'https://lichess1.org/assets/piece/cburnett/';
const sndMove = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Configuración de botones
document.querySelectorAll('.opt-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const parent = e.target.parentElement;
    parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
    e.target.classList.add('sel');
    if(parent.id === 'og-time') configLocal.time = e.target.dataset.val;
    if(parent.id === 'og-color') configLocal.color = e.target.dataset.val;
  });
});

peer.on('open', id => miID = id);

// LÓGICA DEL HOST
peer.on('connection', c => {
  conn = c;
  setupComms();
  actualizarEstadoExcel(miID, "jugando");
  
  miColor = configLocal.color;
  orientacion = miColor;
  const [base, inc] = configLocal.time.split('+').map(Number);
  
  const cfg = { base, inc, hostColor: miColor };
  conn.send({ t: 'config', cfg, rivalColor: miColor === 'w' ? 'b' : 'w' });
});

function setupComms() {
  conn.on('data', data => {
    if (data.t === 'config') {
      configRecibida = data.cfg;
      miColor = data.rivalColor;
      orientacion = miColor;
      document.getElementById('jp-time').textContent = data.cfg.base + " min";
      document.getElementById('jp-color').textContent = miColor === 'w' ? 'Blancas' : 'Negras';
      go('s-join-preview');
    }
    if (data.t === 'start') {
      iniciarPartida(data.cfg);
      go('s-game');
    }
    if (data.t === 'mov') {
      juego.move(data.m);
      sndMove.play().catch(()=>{});
      render();
      actualizarEstado();
    }
  });
}

function crearPartida() {
  go('s-lobby');
  document.getElementById('lobby-id').textContent = miID;
  fetch(URL_API, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action: "publicar", id: miID, tiempo: configLocal.time, modo: "Normal" })
  });
}

function cargarLobbyPublico() {
  const lista = document.getElementById('lista-partidas');
  lista.innerHTML = 'Buscando...';
  fetch(URL_API).then(r => r.json()).then(data => {
    lista.innerHTML = '';
    if(data.length === 0) lista.innerHTML = "No hay partidas.";
    data.forEach(p => {
      const div = document.createElement('div');
      div.className = 'partida-item';
      div.innerHTML = `<span>⏱ ${p.tiempo}</span> <button class="opt-btn">Unirse</button>`;
      div.onclick = () => { conn = peer.connect(p.id); setupComms(); };
      lista.appendChild(div);
    });
  });
}

function confirmarUnirse() {
  conn.send({ t: 'start', cfg: configRecibida });
  iniciarPartida(configRecibida);
  go('s-game');
}

function iniciarPartida(cfg) {
  tiempo = { w: cfg.base * 60, b: cfg.base * 60 };
  juego = new Chess();
  render();
  actualizarEstado();
  if(!reloj) {
    reloj = setInterval(() => {
      tiempo[juego.turn()]--;
      updateClockUI();
      if(tiempo[juego.turn()] <= 0) { clearInterval(reloj); alert("Tiempo agotado"); }
    }, 1000);
  }
}

function render() {
  const cont = document.getElementById('tablero');
  cont.innerHTML = '';
  const board = juego.board();
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const col = orientacion === 'w' ? c : 7 - c;
      const row = orientacion === 'w' ? r : 7 - r;
      const sq = 'abcdefgh'[col] + (8 - row);
      const d = document.createElement('div');
      d.className = 'casilla ' + ((r + c) % 2 ? 'oscura' : 'clara');
      if (sqSel === sq) d.classList.add('seleccionada');
      if (destinosPosibles.includes(sq)) d.classList.add('destino-posible');
      
      d.onclick = () => manejarClick(sq);
      const pieza = board[row][col];
      if (pieza) {
        const img = document.createElement('img');
        img.src = `${PIEZAS}${pieza.color}${pieza.type.toUpperCase()}.svg`;
        d.appendChild(img);
      }
      cont.appendChild(d);
    }
  }
}

let sqSel = null;
let destinosPosibles = [];
function manejarClick(sq) {
  if (juego.turn() !== miColor) return;
  if (sqSel && destinosPosibles.includes(sq)) {
    const mov = juego.move({ from: sqSel, to: sq, promotion: 'q' });
    if(mov) {
      conn.send({ t: 'mov', m: { from: sqSel, to: sq } });
      sndMove.play().catch(()=>{});
      sqSel = null; destinosPosibles = [];
      render(); actualizarEstado();
    }
  } else {
    const pieza = juego.get(sq);
    if (pieza && pieza.color === miColor) {
      sqSel = sq;
      destinosPosibles = juego.moves({ square: sq, verbose: true }).map(m => m.to);
      render();
    }
  }
}

function updateClockUI() {
  const f = s => Math.floor(s/60) + ':' + (s%60).toString().padStart(2,'0');
  document.getElementById('tw').textContent = f(tiempo.w);
  document.getElementById('tb').textContent = f(tiempo.b);
  document.getElementById('cw').classList.toggle('active', juego.turn() === 'w');
  document.getElementById('cb').classList.toggle('active', juego.turn() === 'b');
}

function actualizarEstado() {
  const turn = juego.turn() === 'w' ? 'Blancas' : 'Negras';
  document.getElementById('status-bar').textContent = "Turno de " + turn;
}

function actualizarEstadoExcel(id, estado) {
  fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "actualizarEstado", id, estado }) });
}

function girar() { orientacion = orientacion === 'w' ? 'b' : 'w'; render(); }

render();
</script>
</body>
</html>
