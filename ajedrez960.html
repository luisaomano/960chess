<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Online Pro - Dual Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1026, #2a1740);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #top { text-align: center; padding: 20px; }
        #main { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        
        #tablero {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            border: 5px solid #5a2d91;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .casilla {
            width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .clara { background: #d8c3ff; }
        .oscura { background: #6b4ca3; }
        
        /* Estilos de selección y ayuda */
        .seleccionada { background: #ffd700 !important; }
        .destino-posible::after {
            content: '';
            width: 20px; height: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            position: absolute;
        }

        img { width: 60px; cursor: grab; user-select: none; }
        img:active { cursor: grabbing; }

        .panel { display: flex; flex-direction: column; gap: 10px; }
        button {
            padding: 10px 15px; background: #5a2d91; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #7b3fc2; }
        button:disabled { opacity: 0.3; }

        input { padding: 10px; border-radius: 6px; border: none; width: 150px; }
        
        #status { 
            margin-top: 15px; font-size: 1.2em; font-weight: bold; min-height: 1.5em; color: #bc9eff;
        }
        .alerta { color: #ff4d4d !important; text-shadow: 0 0 10px rgba(255,0,0,0.5); }

        #reloj { margin-top: 20px; font-size: 24px; background: rgba(0,0,0,0.3); padding: 10px 30px; border-radius: 50px; }
        .mi-id-box { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px; color: #00ffcc; font-family: monospace; }
    </style>
</head>
<body>

<div id="top">
    <h2>♟️ Ajedrez Online Dual</h2>
    <div style="margin-bottom: 15px;">
        <input id="roomId" placeholder="ID del rival">
        <button onclick="unirse()">Unirse</button>
    </div>
    <p>Tu ID: <span id="miId" class="mi-id-box">Cargando...</span></p>
    <div id="status">🔄 Conectando...</div>
</div>

<div id="main">
    <div class="panel">
        <button id="btn960" onclick="iniciar960()">🎲 Modo 960</button>
        <button id="btnNueva" onclick="nuevaPartida()">♻️ Nueva</button>
    </div>
    <div id="tablero"></div>
    <div class="panel">
        <button onclick="girar()">↕️ Girar</button>
        <button onclick="rendirse()">🏳️ Rendirse</button>
    </div>
</div>

<div id="reloj">
    ⚪ <span id="tw">5:00</span> | ⚫ <span id="tb">5:00</span>
</div>

<script>
let juego = new Chess();
let peer = new Peer();
let conn;
let miID = null, miColor = 'w', orientacion = 'w';
let tiempo = { w: 300, b: 300 }, reloj = null, partidaActiva = false;

// Variables para el sistema de Clic
let sqSeleccionado = null;
let destinosPosibles = [];

const PIEZAS_URL = 'https://lichess1.org/assets/piece/cburnett/';
const sndMove = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'); 
const sndCapture = new Audio('https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3');
const sndCheck = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

// --- RED ---
peer.on('open', id => {
    miID = id;
    document.getElementById('miId').textContent = id;
    actualizarMensaje("🟢 Conectado.");
});

peer.on('connection', c => {
    conn = c; miColor = 'w'; orientacion = 'w';
    setupComms(); iniciarPartida();
});

function unirse() {
    let idRival = document.getElementById('roomId').value.trim();
    if (!idRival) return;
    conn = peer.connect(idRival);
    miColor = 'b'; orientacion = 'b';
    conn.on('open', () => { setupComms(); iniciarPartida(); });
}

function setupComms() {
    conn.on('data', data => {
        if (data.t === 'mov') {
            const m = juego.move(data.m);
            gestionarEfectos(m);
            tiempo = data.tiempo;
            if (reloj === null) startClock();
        }
        if (data.t === 'init') {
            juego = data.fen ? new Chess(data.fen) : new Chess();
            iniciarPartida();
        }
        if (data.t === 'rend') finalizarJuego("🏆 El rival se rindió");
        render();
        updateClockUI();
        actualizarEstadoVisual();
    });
}

// --- LÓGICA DE MOVIMIENTOS ---

function intentarMovimiento(desde, hasta) {
    const moveData = { from: desde, to: hasta, promotion: 'q' };
    const mov = juego.move(moveData);

    if (mov) {
        gestionarEfectos(mov);
        if (reloj === null) startClock();
        tiempo[miColor] += 2; 
        if (conn) conn.send({ t: 'mov', m: moveData, tiempo: tiempo });
        
        // Limpiar selección tras mover
        sqSeleccionado = null;
        destinosPosibles = [];
        
        render();
        updateClockUI();
        actualizarEstadoVisual();
        return true;
    }
    return false;
}

// Evento Click
function manejarClickCasilla(sq) {
    if (!partidaActiva || juego.turn() !== miColor) return;

    // Si ya hay algo seleccionado y hacemos clic en un destino válido
    if (sqSeleccionado && destinosPosibles.includes(sq)) {
        intentarMovimiento(sqSeleccionado, sq);
        return;
    }

    // Seleccionar una pieza propia
    const pieza = juego.get(sq);
    if (pieza && pieza.color === miColor) {
        sqSeleccionado = sq;
        destinosPosibles = juego.moves({ square: sq, verbose: true }).map(m => m.to);
    } else {
        sqSeleccionado = null;
        destinosPosibles = [];
    }
    render();
}

// Eventos Arrastrar
function onDragStart(ev, source) {
    if (!partidaActiva || juego.turn() !== miColor) {
        ev.preventDefault();
        return;
    }
    const pieza = juego.get(source);
    if (!pieza || pieza.color !== miColor) {
        ev.preventDefault();
        return;
    }
    sqSeleccionado = source; // También seleccionamos al arrastrar
    ev.dataTransfer.setData("text", source);
}

function onDrop(ev, target) {
    ev.preventDefault();
    const source = ev.dataTransfer.getData("text");
    intentarMovimiento(source, target);
}

// --- UI Y RENDER ---

function render() {
    const contenedor = document.getElementById('tablero');
    contenedor.innerHTML = '';
    const board = juego.board();

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const col = orientacion === 'w' ? c : 7 - c;
            const row = orientacion === 'w' ? r : 7 - r;
            const sq = 'abcdefgh'[col] + (8 - row);

            const d = document.createElement('div');
            d.className = 'casilla ' + ((r + c) % 2 ? 'oscura' : 'clara');
            
            // Visual de selección y destinos
            if (sqSeleccionado === sq) d.classList.add('seleccionada');
            if (destinosPosibles.includes(sq)) d.classList.add('destino-posible');

            // Drag & Drop
            d.ondragover = (e) => e.preventDefault();
            d.ondrop = (e) => onDrop(e, sq);
            
            // Click
            d.onclick = () => manejarClickCasilla(sq);

            const pieza = board[row][col];
            if (pieza) {
                const img = document.createElement('img');
                img.src = `${PIEZAS_URL}${pieza.color}${pieza.type.toUpperCase()}.svg`;
                img.draggable = true;
                img.ondragstart = (e) => onDragStart(e, sq);
                // Evitamos que el click en la imagen no llegue a la casilla
                img.onclick = (e) => { e.stopPropagation(); manejarClickCasilla(sq); };
                d.appendChild(img);
            }
            contenedor.appendChild(d);
        }
    }
}

function gestionarEfectos(mov) {
    if (!mov) return;
    if (juego.in_check()) sndCheck.play();
    else if (mov.captured) sndCapture.play();
    else sndMove.play();
}

function actualizarEstadoVisual() {
    if (!partidaActiva) return;
    let msg = "";
    let alert = false;
    const esMiTurno = juego.turn() === miColor;

    if (juego.in_checkmate()) {
        msg = `🚩 Jaque Mate. Ganan ${juego.turn()==='w'?'Negras':'Blancas'}`;
        alert = true; finalizarJuego(msg);
    } else if (juego.in_draw()) {
        msg = "🤝 Empate"; finalizarJuego(msg);
    } else if (juego.in_check()) {
        msg = `⚠️ Jaque a las ${juego.turn()==='w'?'Blancas':'Negras'}`;
        alert = true;
    } else {
        msg = esMiTurno ? "👉 Tu turno" : "⏳ Esperando al rival...";
    }
    actualizarMensaje(msg, alert);
}

function actualizarMensaje(t, a) {
    const s = document.getElementById('status');
    s.textContent = t; s.className = a ? "alerta" : "";
}

function iniciarPartida() {
    partidaActiva = true;
    tiempo = { w: 300, b: 300 };
    clearInterval(reloj);
    reloj = null;
    sqSeleccionado = null;
    destinosPosibles = [];
    document.getElementById('btn960').disabled = true;
    document.getElementById('btnNueva').disabled = true;
    render();
    updateClockUI();
    actualizarEstadoVisual();
}

function startClock() {
    reloj = setInterval(() => {
        tiempo[juego.turn()]--;
        if (tiempo[juego.turn()] <= 0) finalizarJuego("⏰ Tiempo agotado.");
        updateClockUI();
    }, 1000);
}

function updateClockUI() {
    const f = (s) => Math.floor(s / 60) + ':' + (s % 60).toString().padStart(2, '0');
    document.getElementById('tw').textContent = f(tiempo.w);
    document.getElementById('tb').textContent = f(tiempo.b);
}

function finalizarJuego(m) {
    partidaActiva = false; clearInterval(reloj);
    actualizarMensaje(m, true);
    document.getElementById('btn960').disabled = false;
    document.getElementById('btnNueva').disabled = false;
}

function iniciar960() {
    let p = ['r','n','b','q','k','b','n','r'].sort(() => Math.random() - 0.5);
    let fen = p.join('')+'/pppppppp/8/8/8/8/PPPPPPPP/'+p.map(x=>x.toUpperCase()).join('')+' w - - 0 1';
    juego = new Chess(fen);
    if (conn) conn.send({ t:'init', fen: fen });
    iniciarPartida();
}

function nuevaPartida() {
    juego = new Chess();
    if (conn) conn.send({ t:'init', fen: null });
    iniciarPartida();
}

function girar() { orientacion = orientacion === 'w' ? 'b' : 'w'; render(); }
function rendirse() { if(partidaActiva) { finalizarJuego("🏳️ Te rendiste"); if(conn) conn.send({t:'rend'}); } }

render();
</script>
</body>
</html>
